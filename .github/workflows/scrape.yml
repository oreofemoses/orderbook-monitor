name: Hourly Orderbook Scraper

on:
  schedule:
    - cron: '17 * * * *'
  
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10  # Prevent hanging forever
    
    # REQUIRED: Grant permission to push data back to the repository
    permissions:
      contents: write
    
    # Docker service with Chrome pre-installed
    services:
      chrome:
        image: selenium/standalone-chrome:latest
        ports:
          - 4444:4444
        options: --shm-size=2g
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip' # speeds up subsequent runs
    
    - name: Wait for Chrome to be ready
      run: |
        timeout 30 bash -c 'until curl -s http://localhost:4444/wd/hub/status > /dev/null 2>&1; do echo "Waiting for Chrome..."; sleep 2; done'
        echo "Chrome is ready!"
    
    - name: Install Python dependencies
      run: |
        pip install --upgrade pip
        pip install selenium pandas requests
    
    - name: Run scraper
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        SELENIUM_REMOTE_URL: http://localhost:4444/wd/hub
      run: python scraper.py
    
    - name: Commit and push results
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        # Add files in data folder
        git add data/
        git pull origin main --rebase --autostash
        
        # Check if there are changes before committing to avoid errors
        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          git commit -m "📊 Update orderbook data - $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
        fi
