name: Hourly Orderbook Scraper

on:
  schedule:
    - cron: '23 * * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install system dependencies with retry
      run: |
        # Clean apt locks
        sudo rm -f /var/lib/apt/lists/lock
        sudo rm -f /var/cache/apt/archives/lock
        sudo rm -f /var/lib/dpkg/lock*
        sudo dpkg --configure -a
        
        # Retry apt-get update
        for i in 1 2 3; do
          sudo apt-get update && break || sleep 15
        done
        
        # Retry chromium install
        for i in 1 2 3; do
          sudo apt-get install -y chromium-browser chromium-chromedriver && break || sleep 15
        done
    
    - name: Cache Python dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install Python dependencies
      run: |
        pip install --upgrade pip
        pip install selenium pandas requests python-dotenv
    
    - name: Run scraper
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: timeout 600 python scraper.py || true
    
    - name: Commit and push results
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add data/ || true
        git diff --quiet && git diff --staged --quiet || (git commit -m "📊 Update - $(date -u +'%Y-%m-%d %H:%M UTC')" && git push) || true
