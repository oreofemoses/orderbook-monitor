name: Hourly Orderbook Scraper

on:
  schedule:
    - cron: '26 * * * *'

  workflow_dispatch:

concurrency:
  group: orderbook-monitor
  cancel-in-progress: true

jobs:
  scrape:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Force sync with remote
      run: |
        git fetch origin
        git reset --hard origin/main

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y chromium-browser chromium-chromedriver

    - name: Install Python dependencies
      run: |
        pip install --upgrade pip
        pip install selenium pandas requests

    - name: Run scraper
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        PAIRS_CONFIG: ${{ secrets.PAIRS_CONFIG }}
      run: python scraper.py

    - name: Commit and push results
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"

        git add data/

        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          git commit -m "📊 Update orderbook data - $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push origin main
        fi